name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore
      run: dotnet restore AcEvoFfbTuner.slnx
    - name: Build
      run: dotnet build AcEvoFfbTuner.slnx -c Release --no-restore
    - name: Test
      run: dotnet test src/AcEvoFfbTuner.Tests -c Release --no-restore --no-build
