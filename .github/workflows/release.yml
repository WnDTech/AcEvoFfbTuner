name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/AcEvoFfbTuner/AcEvoFfbTuner.csproj'
  CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            $ver = $Matches[1]
          } elseif ('${{ github.event.inputs.version }}') {
            $ver = '${{ github.event.inputs.version }}'
          } else {
            $ver = '0.0.0-dev'
          }
          "version=$ver" >> $env:GITHUB_OUTPUT
          "tag=v$ver" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore AcEvoFfbTuner.slnx

      - name: Build
        run: dotnet build AcEvoFfbTuner.slnx -c ${{ env.CONFIGURATION }} -p:Version=${{ steps.version.outputs.version }} --no-restore

      - name: Publish (self-contained single-file)
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c ${{ env.CONFIGURATION }}
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.version }}
          -o ./publish

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $issPath = "C:\Users\runneradmin\Documents\Inno Setup Examples\setup.iss"
          $iss = Get-Content "installer\setup.iss" -Raw
          $iss = $iss -replace '\.\.\\publish-test', '.\publish'
          $iss = $iss -replace '\.\.\\src', '.\src'
          $iss = $iss -replace '\.\.\\README', '.\README'
          $iss = $iss -replace '\.\.\\installer-output', '.\installer-output'
          Set-Content -Path "installer\setup-ci.iss" -Value $iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\setup-ci.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AC Evo FFB Tuner ${{ steps.version.outputs.tag }}"
          draft: true
          generate_release_notes: true
          files: |
            ./installer-output/AcEvoFfbTuner-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
